<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Individual Profile | Advisor Planning Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script>
    try {
      if (sessionStorage.getItem("lensRouteLoading")) {
        document.documentElement.classList.add("is-route-loading");
      }
    } catch (error) {}
  </script>
</head>
<body class="home-page prospect-page profile-creation-page">
  <div class="route-loading-overlay" data-route-loading-overlay>
    <div class="route-loading-card">
      <span class="route-loading-icon" aria-hidden="true">
        <span class="account-icon-head route-loading-head"></span>
        <span class="account-icon-body route-loading-body"></span>
      </span>
      <p class="route-loading-text">Opening individual profile...</p>
    </div>
  </div>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="../index.html">
        <span class="site-brand-mark">LENS</span>
      </a>
      <div class="site-header-actions">
        <form class="site-search has-icon" role="search">
          <input type="search" placeholder="Search" data-i18n-placeholder="search.placeholder">
        </form>
        <nav class="site-nav" aria-label="Main navigation">
          <div class="site-dropdown">
            <button class="site-nav-link site-dropdown-toggle is-active" type="button" aria-expanded="true" data-i18n="nav.records">Records</button>
            <div class="site-dropdown-menu">
              <a class="site-dropdown-link is-active" href="clients.html" data-i18n="nav.clients" data-client-directory-nav>Clients</a>
            </div>
          </div>
          <div class="site-dropdown">
            <button class="site-nav-link site-dropdown-toggle" type="button" aria-expanded="false" data-i18n="nav.financialProducts">Financial Products</button>
            <div class="site-dropdown-menu">
              <a class="site-dropdown-link" href="lens.html">LENS</a>
            </div>
          </div>
        </nav>
        <div class="language-slot" data-language-slot></div>
        <div class="account-slot" data-account-slot></div>
      </div>
    </div>
  </header>

  <main class="home-shell app-home-shell prospect-shell">
    <section class="prospect-stage">
      <section class="prospect-empty-panel">
        <div class="prospect-panel-header">
          <a class="prospect-return-button" href="new-prospect.html">Return to Create Client Profile</a>
          <h1>Create Individual Profile</h1>
        </div>
      </section>
    </section>
  </main>

  <script src="../data.js"></script>
  <script src="../calculations.js"></script>
  <script src="../charts.js"></script>
  <script src="../app.js"></script>
</body>
</html>
